<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #17212b; color: white; font-family: sans-serif; padding: 15px; margin: 0; }
        .msg { padding: 10px 15px; border-radius: 15px; margin-bottom: 10px; max-width: 80%; }
        .bot { background: #2b3a4a; align-self: flex-start; }
        .user { background: #248bda; align-self: flex-end; margin-left: auto; }
        .hidden { display: none; }
        .typing { font-size: 12px; color: #6c7883; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div id="chat">
        <div class="msg bot">Привет! Хочешь помогу создать твоего бота?</div>
        <button id="b1" class="msg user" onclick="step1()">Да.</button>
        <div id="m2" class="msg bot hidden">Смотри, если ты готов, то тебе придёт код в телеграм... И так, ты готов создать бота?</div>
        <button id="b2" class="msg user hidden" onclick="step2()">Да, я готов.</button>
        <div id="m3" class="msg bot hidden">Отлично! Введи свой bot_api в строку ниже.</div>
    </div>
    <div id="typing" class="typing hidden">бот печатает...</div>
    <input type="text" id="api_input" disabled placeholder="Жду ответа...">

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        function step1() {
            document.getElementById('b1').disabled = true;
            document.getElementById('typing').classList.remove('hidden');
            setTimeout(() => {
                document.getElementById('typing').classList.add('hidden');
                document.getElementById('m2').classList.remove('hidden');
                document.getElementById('b2').classList.remove('hidden');
            }, 1500);
        }

        function step2() {
            document.getElementById('b2').disabled = true;
            document.getElementById('typing').classList.remove('hidden');
            setTimeout(() => {
                document.getElementById('typing').classList.add('hidden');
                document.getElementById('m3').classList.remove('hidden');
                document.getElementById('api_input').disabled = false;
                // При отправке данных боту
                document.getElementById('api_input').onchange = () => {
                    tg.sendData(document.getElementById('api_input').value);
                };
            }, 2000);
        }
    </script>
</body>
</html>
